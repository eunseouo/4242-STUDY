<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      /* 선택적으로 스타일링을 추가할 수 있습니다. */
      #rectangle {
        width: 200px;
        height: 100px;
        background-color: lightblue;
        text-align: center;
        line-height: 100px;
        margin: 10px;
      }
    </style>
  </head>
  <body>
    <!-- 값을 표시할 div -->
    <div id="rectangle"></div>

    <script>
      // prompt로 사용자에게 값을 입력받기
      var userInput = prompt('값을 입력하세요.');

      // div에 입력받은 값을 표시
      document.getElementById('rectangle').textContent = userInput;
    </script>
  </body>
</html>
