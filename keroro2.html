<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  </head>
  <body>
    <select name="" class="selectBasic" onchange="showRankMessage()">
      <option value="sergeant">케로로</option>
      <option value="corporal">도로로</option>
      <option value="private">타마마</option>
    </select>

    <script>
      function showRankMessage() {
        // select 박스에서 선택한 값을 가져오기
        var selectedRank = document.getElementsByClassName('selectBasic').value;
        console.log(selectedRank);

        // 선택한 값에 따라 다른 메시지를 alert로 표시
        if (selectedRank === 'sergeant') {
          alert('중사입니다.');
        } else if (selectedRank === 'corporal') {
          alert('병장입니다.');
        } else if (selectedRank === 'private') {
          alert('이등병입니다.');
        } else {
          alert('올바른 계급을 선택하세요.');
        }
      }
    </script>
  </body>
</html>
